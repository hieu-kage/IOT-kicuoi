version: '3.8'

services:
  backend:
    build: ./BE
    ports:
      - "${BACKEND_PORT}:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./BE:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
    networks:
      - app_network

  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data_of_postgree:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    networks:
      - app_network

  mqtt:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker
    restart: always
    ports:
      - "${MQTT_PORT}:8001"
    volumes:
      - ./Broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./Broker/password.txt:/mosquitto/config/password.txt
      - ./Broker/data:/mosquitto/data
    networks:
      - app_network

networks:
  app_network:
    name: ${NETWORK_NAME}
